# Plantilla de config dinámica de Traefik para exponer SignIT (pm2, puerto 8711)
# detrás de Traefik. Ajustar dominio, entryPoint y certResolver a como esté
# configurado el Traefik de este server, y copiar al directorio que Traefik
# lee como "file provider" (ej. /etc/traefik/dynamic/signit.yml).

http:
  routers:
    signit:
      rule: "Host(`signit.signai.ar`)"
      service: signit
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt # reemplazar por el nombre del resolver ya configurado
      middlewares:
        - signit-headers

  services:
    signit:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8711"

  middlewares:
    # Si hay un middleware de headers compartido con otras apps del server
    # (el que está mandando Referrer-Policy: same-origin y rompe el embed
    # de YouTube — Error 153), este override reemplaza ese valor solo para
    # el router de signit sin tocar el middleware compartido ni las otras apps.
    signit-headers:
      headers:
        referrerPolicy: "strict-origin-when-cross-origin"
